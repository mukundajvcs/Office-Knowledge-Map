<mat-toolbar color="primary" class="app-toolbar" *ngIf="isAuthenticated()">
  <span class="app-title">
    <mat-icon>corporate_fare</mat-icon>
    {{ title }}
  </span>

  <span class="spacer"></span>

  <nav class="nav-menu">
    <button mat-button routerLink="/dashboard" *ngIf="isAdmin()">
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </button>
    <button mat-button routerLink="/team-hierarchy" *ngIf="isManagerOrAbove()">
      <mat-icon>account_tree</mat-icon>
      Hierarchy
    </button>
    <button mat-button routerLink="/skills">
      <mat-icon>psychology</mat-icon>
      My Skills
    </button>
    <button mat-button routerLink="/endorsements">
      <mat-icon>thumb_up</mat-icon>
      Endorsements
    </button>
    <button mat-button routerLink="/search" *ngIf="isManagerOrAbove()">
      <mat-icon>search</mat-icon>
      Search
    </button>
    <button mat-button routerLink="/analytics" *ngIf="isManagerOrAbove()">
      <mat-icon>insights</mat-icon>
      Analytics
    </button>
    <button mat-button routerLink="/profile">
      <mat-icon>person</mat-icon>
      Profile
    </button>
  </nav>

  <button mat-icon-button [matMenuTriggerFor]="userMenu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <div class="user-menu-header">
      <strong>{{ currentUser?.name }}</strong>
      <span class="user-role">{{ currentUser?.role }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>My Profile</span>
    </button>
    <button mat-menu-item routerLink="/skills">
      <mat-icon>psychology</mat-icon>
      <span>My Skills</span>
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>

<main class="app-content">
  <router-outlet></router-outlet>
</main>
